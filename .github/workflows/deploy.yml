name: Deploy static content to Pages

on:
    push:
        branches: ["main"]

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Pages
              uses: actions/configure-pages@v5
            - name: Upload artifact
              # FIX: bumped from v3 to v4. v3 is deprecated; GitHub will force-upgrade
              # it automatically but doing so here keeps the version explicit and auditable.
              uses: actions/upload-pages-artifact@v4
              with:
                  path: '.'
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
