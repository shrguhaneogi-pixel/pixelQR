name: Automated QR Code Build

on:
    push:
        branches: ["main"]

permissions:
    contents: write

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Install dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y qrencode
                  npm install -g html-minifier-terser

            - name: Minify HTML
              run: |
                  html-minifier-terser \
                      --collapse-whitespace \
                      --remove-comments \
                      --remove-optional-tags \
                      --remove-redundant-attributes \
                      --remove-script-type-attributes \
                      --remove-tag-whitespace \
                      --use-short-doctype \
                      --minify-css true \
                      --minify-js true \
                      pixel_qr.html -o minified.html

            # FIX: validate that the minified file was actually produced and is non-empty.
            # The minifier exits 0 even on some failure modes; an empty output file would
            # silently encode an empty QR code.
            - name: Validate minified output
              run: |
                  if [ ! -s minified.html ]; then
                      echo "ERROR: minified.html is empty or missing"
                      exit 1
                  fi
                  MINIFIED_BYTES=$(wc -c < minified.html)
                  echo "Minified size: ${MINIFIED_BYTES} bytes"

            - name: Generate QR Code
              run: |
                  # URL-encode the minified HTML into a data: URI using Node.js.
                  ENCODED_HTML=$(node -e "console.log(encodeURIComponent(require('fs').readFileSync('minified.html', 'utf8')));")
                  DATA_URI="data:text/html;charset=utf-8,${ENCODED_HTML}"

                  URI_LEN=${#DATA_URI}
                  echo "Data URI length: ${URI_LEN} characters"

                  # FIX: guard against payloads that exceed the QR version-40 / L-level
                  # capacity of 2953 bytes.  qrencode exits non-zero when the data is too
                  # large, which would already fail the step, but surfacing the size here
                  # makes the root cause immediately visible in the log.
                  QR_MAX=2953
                  if [ "${URI_LEN}" -gt "${QR_MAX}" ]; then
                      echo "ERROR: data URI (${URI_LEN} chars) exceeds QR v40/L capacity (${QR_MAX} bytes)."
                      echo "Reduce pixel_qr.html further before committing, or consider hosting"
                      echo "the file and encoding a short URL instead."
                      exit 1
                  fi

                  qrencode -s 10 -l L -o pixelQR.png "$DATA_URI"

            # FIX: verify the PNG was actually written before attempting the release.
            # qrencode exits non-zero on error, but the release step would otherwise
            # fail with a confusing "file not found" message.
            - name: Verify QR output
              run: |
                  if [ ! -f pixelQR.png ]; then
                      echo "ERROR: pixelQR.png was not created"
                      exit 1
                  fi
                  echo "QR PNG size: $(wc -c < pixelQR.png) bytes"

            - name: Publish GitHub Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Create a dynamic version tag based on the GitHub run number.
                  # FIX: corrected "Github" -> "GitHub" in title/notes for consistency.
                  TAG_NAME="v1.0.${{ github.run_number }}"

                  gh release create "$TAG_NAME" pixelQR.png \
                        --title "PixelQR Build $TAG_NAME" \
                        --notes "Automated QR code generated from the latest push." \
                        --latest
