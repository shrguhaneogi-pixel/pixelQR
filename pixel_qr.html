<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel QR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #111111;
            font-family: sans-serif;
        }

        #g {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 3px;
            padding: 12px;
            background-color: #1a1a1a;
            border-radius: 10px;
            touch-action: none;
        }

        div.c {
            width: 38px;
            height: 38px;
            background-color: #222;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.1s ease;
        }

        div.c.on {
            background-color: #f0e040;
            animation: pop 120ms ease-in-out 0s infinite alternate;
        }

        @keyframes pop {
            0%, 50% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            
        }

        h1 {
            color: #f0e040;
            font-size: 18px;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        button {
            margin-top: 12px;
            padding: 8px 16px;
            background-color: #f0e040;
            border: none;
            border-radius: 6px;
            color: #111111;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background-color 0.1s ease;
        }
    </style>
</head>
<body>
    <h1>Pixel QR</h1>
    <div id="g"></div>
    <button onclick="rnd()">RNDM</button>
    <button id="sb" onclick="cyc()">SYM:OFF</button>

    <script>
        var G = document.getElementById('g');
        var i=0;
        for(; i<64; i++) {
            var d = document.createElement('div');
            d.className='c';
            G.appendChild(d);
        }
        var drw=0;
            dir=0;
            mov=0;
            sym=0;

        var sl=['SYM:OFF', 'SYM:H', 'SYM:V', 'SYM:Q'];

        function cyc() {
            sym=(sym+1) % 4;
            document.getElementById('sb').textContent = sl[sym];
            
        }

        function pnt(n) {
            var c = G.children;
            if(!c[n] || !c[n].classList.contains('c')) return;{
            }
            c[n].classList[dir ? 'add' : 'remove']('on');
            var x = n % 8;
            var y = ~~(n / 8);

            if(sym===1 || sym===3) {
                c[y*8 + (7-x)].classList[dir ? 'add' : 'remove']('on');
            }
            if(sym===2 || sym===3) {
                c[(7-y)*8 + x].classList[dir ? 'add' : 'remove']('on');
            }
            if(sym===3) {
                c[(7-y)*8 + (7-x)].classList[dir ? 'add' : 'remove']('on');
            }
        }

        G.addEventListener('pointerdown', function(e) {
            var t=e.target;
            if(!t.classList.contains('c')) return;

            drw=1;
            mov=0;
            var n = Array.prototype.indexOf.call(G.children, t);
            dir=t.classList.contains('on') ? 0 : 1;
            pnt(n);
        });

        G.addEventListener('pointermove', function(e) {
            if(!drw) return;
            mov=1;
            var t=e.target;
            if(t && t.classList.contains('c')){
                var n = Array.prototype.indexOf.call(G.children, t);
                pnt(n);
            }
        });
        document.addEventListener('pointerup', function(e) {
            drw=0;
        });
        document.addEventListener('pointercancel', function(e) {
            drw=0;
        });

        G.addEventListener('dblclick', function() {
            if(mov) return;
            inv();
        });

        document.addEventListener('keydown', function(e) {
            if(e.key === 'i') inv();
        });

        function inv() {
            var c = G.children;
            for (var j = 0; j < 64; j++) {
                c[j].classList.toggle('on');
            };
        }

        function rnd() {
            var c = G.children;
            for (var j = 0; j < 64; j++) {
                c[j].classList[Math.random() > 0.5 ? 'add' : 'remove']('on');
            };
        }
        
    </script>
</body>
</html>
