    height: 38px;
    border-radius: 4px;
    cursor: pointer;
    transition: background-color 0.1s;
}
.s0 { background: var(--c0); }
.s1 { background: var(--c1); }
.s2 { background: var(--c2); }
.s3 { background: var(--c3); }
.btns { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
button {
    padding: 8px 14px;
    background: var(--c1);
    border: none;
    border-radius: 6px;
    color: #111;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
}
button:hover { background: #ffe800; }
