<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel QR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #111111;
            font-family: sans-serif;
        }

        #g {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 3px;
            padding: 12px;
            background-color: #1a1a1a;
            border-radius: 10px;
            touch-action: none;
        }

        div.c {
            width: 38px;
            height: 38px;
            background-color: #222;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.1s ease;
        }

        div.c.on {
            background-color: #f0e040;
            animation: pop 120ms ease-in-out 0.12s;
        }

        @keyframes pop {
            0%, 50% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            
        }

        h1 {
            color: #f0e040;
            font-size: 18px;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .btns {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        button {
            padding: 8px 16px;
            background-color: #f0e040;
            border: none;
            border-radius: 6px;
            color: #111111;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background-color 0.1s ease;
        }

        button:hover {
            background-color: #ffe800;
        }
    </style>
</head>
<body>
    <h1>Pixel QR</h1>
    <div id="g"></div>
    <div class="btns">
        <button id="mb" onclick="nextMode()">MODE:DRAW</button>
        <button id="sb" onclick="nextSym()">SYM:OFF</button>
    </div>
    <script>
        var G = document.getElementById('g');
        for(let i=0; i<64; i++) {
            var d = document.createElement('div');
            d.className='c';
            G.appendChild(d);
        }
        var mode=0,
            drw=0,
            dir=0,
            mov=0,
            sym=0,
            anim=null,
            life=null;

        var ml=['MODE:DRAW', 'MODE:ANIMATE', 'MODE:CONWAY'];  
        var sl=['SYM:OFF', 'SYM:H', 'SYM:V', 'SYM:Q'];

        function setMode(n) {
            clearInterval(anim); anim=null;
            clearInterval(life); life=null;
            mode = n%3;
            document.getElementById('mb').textContent = ml[mode];
            if(mode===1) {
                anim = setInterval(animT, 120);
            } else if(mode===2) {
                life = setInterval(conway, 500);
            }
        }

        function nextMode() {
            setMode(mode+1);
        }

        function nextSym() {
            sym = (sym+1)%4;
            document.getElementById('sb').textContent = sl[sym];
        }

        function animT() {
            var c = G.children;
            var count=0;
            while(count<8) {
                var n = ~~(Math.random()*64);
                c[n].classList.toggle('on');
                count++;
            }
        }

        function conway() {
            var c = G.children;
            var cur = [];
            for(let i=0; i<64; i++) cur[i] = c[i].classList.contains('on') ? 1 : 0;
            var nxt=[];
            for(let i=0; i<64; i++) {
                var x = i % 8;
                var y = (i-x) / 8;
                var n = 0;
                for(let j=-1; j<=1; j++) {
                    for(let k=-1; k<=1; k++) {
                        if(j===0 && k===0) continue;
                        var nx = (x + k + 8) % 8;
                        var ny = (y + j + 8) % 8;
                        n += cur[ny*8 + nx];
                    }
                }
                if(cur[i] === 1) {
                    if(n<2 || n>3) nxt.push(i);
                } else {
                    if(n===3) nxt.push(i);
                }
            }
            for(let i=0; i<nxt.length; i++) c[nxt[i]].classList.toggle('on');
        }

        function pnt(n) {
            var c = G.children;
            if(!c[n] || !c[n].classList.contains('c')) return;
            
            if(mode!==0) return;
            c[n].classList[dir ? 'add' : 'remove']('on');
            
            var x = n % 8;
            var y = (n-x) / 8;

            if(sym===1 || sym===3) {
                c[y*8 + (7-x)].classList[dir ? 'add' : 'remove']('on');
            }
            if(sym===2 || sym===3) {
                c[(7-y)*8 + x].classList[dir ? 'add' : 'remove']('on');
            }
            if(sym===3) {
                c[(7-y)*8 + (7-x)].classList[dir ? 'add' : 'remove']('on');
            }
        }

        G.addEventListener('pointerdown', function(e) {
            var t=e.target;
            if(!t.classList.contains('c')) return;

            drw=1;
            var n = Array.prototype.indexOf.call(G.children, t);
            dir=t.classList.contains('on') ? 0 : 1;
            pnt(n);
        });

        G.addEventListener('pointermove', function(e) {
            if(!drw) return;
            var t=e.target;
            if(t && t.classList.contains('c')){
                var n = Array.prototype.indexOf.call(G.children, t);
                pnt(n);
            }
        });
        document.addEventListener('pointerup', function(e) {
            drw=0;
        });
        document.addEventListener('pointercancel', function(e) {
            drw=0;
        });

        G.addEventListener('dblclick', function() {
            inv();
        });

        document.addEventListener('keydown', function(e) {
            if(e.key === 'i') inv();
        });

        function inv() {
            for(let i=0; i<64; i++) G.children[i].classList.toggle('on');
        }      
    </script>
</body>
</html>
